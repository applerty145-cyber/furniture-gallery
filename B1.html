<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>添興家具｜商品型錄展示</title>

        body {

            background-color: #f5efe6;
            margin: 0;
            padding: 20px;
            position: relative;
        }
        
        /* 修正：Logo 保持在右上角，但最大寬度恢復為 200px */
        .header-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            max-width: 200px;
            height: auto;
            z-index: 10;
        }
        
        /* 標題與提示文字區塊 */
        .title-container {
            text-align: center;
            padding-top: 50px; /* 留出空間給右上角的 Logo */
            margin-bottom: 35px;
        }

        /* 「客製架高床」大標題樣式 */
        .section-title {
            color: #4a3f35;
            font-family: "Noto Serif TC", "Songti TC", "ヒラギノ明朝 ProN", "MS 明朝", serif;
            font-size: 2.2rem;
            font-weight: 500;
            margin: 0 auto 15px auto; /* 縮減下方間距，讓副標題靠近 */
            letter-spacing: 4px;
            position: relative;
            padding-bottom: 12px;
            max-width: 280px;
        }
        /* 標題下方的文青細線 */
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 1px;
            background-color: #c5bbae;
        }

        /* 修正：將提示文字移至大標題下方後的樣式 */
        .hint-text {
            color: #70665f;
            font-size: 0.95rem;
            margin: 15px 0 0 0;
            letter-spacing: 1px;
        }

        /* 編號輸入區塊卡片樣式 */
        .search-container {
            background: #fff;
            max-width: 450px;
            margin: 40px auto 15px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #eae6e1;
            text-align: center;
        }
        .search-title {
            font-size: 0.95rem;
            color: #5a504a;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .search-input {
            width: 55%;
            padding: 12px 15px;
            border: 1px solid #d1c9bf;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
            color: #2b2622;
        }

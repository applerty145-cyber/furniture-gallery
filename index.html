<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精選家具線上展示</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fdfcfb; 
            color: #3e3a36;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 50px 20px;
            background-color: #f4efe9; 
            border-bottom: 1px solid #e5dec9;
        }
        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #2b2622;
            letter-spacing: 2px;
        }
        header p {
            color: #70665f;
            margin: 10px 0 0 0;
            font-size: 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .gallery-item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #eae6e1;
        }
        .gallery-item img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gallery-item img:hover {
            opacity: 0.9;
        }
        .item-info {
            padding: 20px;
            background: #fff;
        }
        .item-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.2rem;
            color: #2b2622;
        }
        .item-info p {
            margin: 0;
            color: #8c7f76;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .lightbox {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>添興家具</h1>
        <p>客製架高床線上型錄｜點擊圖片可放大觀看細節</p>
    </header>

    <div class="container">
        <div class="gallery">
            
            <div class="gallery-item">
                <img src="1.jpg" alt="精選家具" onclick="openLightbox(this.src)">
                <div class="item-info">
                    <h3>架高床A</h3>
                    <p></p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="2.jpg" alt="精選家具" onclick="openLightbox(this.src)">
                <div class="item-info">
                    <h3>架高床B</h3>
                    <p></p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="3.jpg" alt="精選家具" onclick="openLightbox(this.src)">
                <div class="item-info">
                    <h3>架高床C</h3>
                    <p></p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="4.jpg" alt="精選家具" onclick="openLightbox(this.src)">
                <div class="item-info">
                    <h3>架高床D</h3>
                    <p></p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="5.jpg" alt="精選家具" onclick="openLightbox(this.src)">
                <div class="item-info">
                    <h3>架高床E</h3>
                    <p></p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="6.jpg" alt="精選家具" onclick="openLightbox(this.src)">
                <div class="item-info">
                    <h3>架高床F</h3>
                    <p></p>
                </div>
            </div>

        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="放大圖">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>

</body>
</html>
